<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Notebook Todo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="todo.css">
    <link rel="icon" href="/to-do-list/todo.png">
    <script defer src="todo.js"></script>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="notebook">

            <!-- FRONT COVER -->

            <div class="cover" id="cover">
                <h2>My Todo Notebook</h2>
                <p>Click to open</p>
            </div>

            <!-- NOTEBOOK PAGE -->

            <div class="page">

                <h3 class="text-center mb-4">Todo List</h3>

                <div class="input-group mb-3">
                    <input type="text" id="taskInput" class="form-control" placeholder="Add new task">
                    <button class="btn btn-primary" id="addBtn">Add</button>
                </div>

                <ul id="taskList" class="list-group"></ul>

            </div>

        </div>

    </div>


</body>

</html>
