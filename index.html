<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskly Notebook Todo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="todo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" href="/to-do-list/todo.png">
    <script defer src="todo.js"></script>
</head>

<body>
     
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="notebook">

            <!-- COVER -->
            <div class="cover" id="cover">
                <h2>My Taskly Notebook</h2>
                <p>Click to open</p>
            </div>

            <div class="pages-container" id="pagesContainer">
            </div>

            <!-- NAVIGATION -->
            <div class="nav-buttons">
                <button id="prevPage"><i class="fas fa-chevron-left"></i></button>
                <button id="centerPage"><i class="fas fa-book-open"></i></button>
                <button id="nextPage"><i class="fas fa-chevron-right"></i></button>
            </div>

        </div>
    </div>
</body>

</html>
